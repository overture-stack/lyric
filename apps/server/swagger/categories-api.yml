/category:
  get:
    summary: List all categories
    tags:
      - Category
    responses:
      200:
        description: List all categories
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListAllCategories'
      400:
        $ref: '#/components/responses/BadRequest'
      401:
        $ref: '#/components/responses/UnauthorizedError'
      404:
        $ref: '#/components/responses/NotFound'
      500:
        $ref: '#/components/responses/ServerError'
      503:
        $ref: '#/components/responses/ServiceUnavailableError'

/category/{categoryId}:
  get:
    summary: Retrieve details of a specific category
    description: >-
      Accepts either the category's numeric id or its alias. If a numeric id could also match a
      different category's alias, the alias wins, allowed on purpose since an alias may be a data
      version label, not just a stand-in for an id.
    tags:
      - Category
    parameters:
      - $ref: '#/components/parameters/path/CategoryId'
    responses:
      200:
        description: Category Details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDetails'
      400:
        $ref: '#/components/responses/BadRequest'
      401:
        $ref: '#/components/responses/UnauthorizedError'
      404:
        $ref: '#/components/responses/NotFound'
      500:
        $ref: '#/components/responses/ServerError'
      503:
        $ref: '#/components/responses/ServiceUnavailableError'

/category/{categoryId}/alias:
  put:
    summary: Assign an alias to a category
    description: >-
      Sets a category's alias. Succeeds when the category has no alias yet, or when the requested
      alias matches its existing one (idempotent retry). Changing an already-set alias to a
      different value isn't supported yet, use DELETE then PUT instead.
    tags:
      - Category
    parameters:
      - $ref: '#/components/parameters/path/CategoryId'
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              alias:
                type: string
                description: >-
                  A stable, human-readable identifier for the category, usable anywhere a
                  categoryId is accepted. Letters, numbers, hyphens, and underscores only. A purely
                  numeric alias is allowed, it may represent a data version label rather than an id.
            required:
              - alias
    responses:
      200:
        description: The category, with its alias set
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategorySummary'
      400:
        $ref: '#/components/responses/BadRequest'
      401:
        $ref: '#/components/responses/UnauthorizedError'
      404:
        $ref: '#/components/responses/NotFound'
      409:
        $ref: '#/components/responses/StatusConflict'
      500:
        $ref: '#/components/responses/ServerError'
      503:
        $ref: '#/components/responses/ServiceUnavailableError'
  delete:
    summary: Clear a category's alias
    description: >-
      Removes a category's alias, freeing it for reuse. Idempotent: a category with no alias
      returns 200 rather than an error.
    tags:
      - Category
    parameters:
      - $ref: '#/components/parameters/path/CategoryId'
    responses:
      200:
        description: The category, with its alias cleared
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategorySummary'
      401:
        $ref: '#/components/responses/UnauthorizedError'
      404:
        $ref: '#/components/responses/NotFound'
      500:
        $ref: '#/components/responses/ServerError'
      503:
        $ref: '#/components/responses/ServiceUnavailableError'
