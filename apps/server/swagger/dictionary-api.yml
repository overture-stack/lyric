# Description of Dictionary API

/dictionary/register:
  post:
    summary: Register a dictionary to a category. Creates the category if it does not exist, or updates its active dictionary and triggers a data migration to validate and update existing data against the new dictionary.
    tags:
      - Dictionary
    parameters:
      - name: force
        description: Retries migration for this category only when the same dictionary is already registered and the most recent migration previously failed. If there is no previous failed migration, this flag is ignored.
        in: query
        required: false
        schema:
          type: boolean
          default: false
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              alias:
                type: string
                description: >-
                  An optional, human-readable identifier for the category, usable anywhere a
                  categoryId is accepted, in place of the numeric id. Doesn't change on its own the
                  way an auto-generated token might, though it can be cleared or reassigned via
                  PUT/DELETE /category/{categoryId}/alias, it isn't permanent the way the numeric id
                  is. Letters, numbers, hyphens, underscores, and periods only; an empty string is
                  treated as not provided. A purely numeric value (e.g. `5`) is rejected, since it
                  could collide with a category's numeric id; a value containing a decimal point
                  (e.g. `2.5`) is allowed, including as a data version label. Can only be set here
                  at category creation; supplying it while registering onto an existing category
                  returns 400. Use PUT/DELETE /category/{categoryId}/alias to add or remove one
                  afterward; changing an already-set alias isn't supported yet.
              categoryName:
                type: string
                description: A user-defined classification to group and organize data based on shared characteristics or criteria
              defaultCentricEntity:
                type: string
                description: The default centric entity name
              dictionaryName:
                type: string
                description: A matching Dictionary Name defined on Dictionary Manager (Lectern)
              dictionaryVersion:
                type: string
                description: A matching Dictionary Version defined on Dictionary Manager (Lectern)
            required:
              - categoryName
              - dictionaryName
              - dictionaryVersion
    responses:
      200:
        description: Dictionary info
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDictionaryResult'
      400:
        $ref: '#/components/responses/BadRequest'
      401:
        $ref: '#/components/responses/UnauthorizedError'
      409:
        $ref: '#/components/responses/StatusConflict'
      500:
        $ref: '#/components/responses/ServerError'
      503:
        $ref: '#/components/responses/ServiceUnavailableError'
/dictionary/category/{categoryId}:
  get:
    summary: Get schema JSON for a specific dictionary by ID and schema name
    tags:
      - Dictionary
    parameters:
      - $ref: '#/components/parameters/path/CategoryId'
    responses:
      200:
        description: Dictionary schema JSON
        content:
          application/json:
            schema:
              type: object
              description: The schema definition JSON
      400:
        $ref: '#/components/responses/BadRequest'
      404:
        $ref: '#/components/responses/NotFound'
      500:
        $ref: '#/components/responses/ServerError'

/dictionary/category/{categoryId}/templates:
  get:
    summary: Download data file templates for a dictionary
    tags:
      - Dictionary
    parameters:
      - $ref: '#/components/parameters/path/CategoryId'
      - name: fileType
        in: query
        required: false
        schema:
          type: string
          enum: [csv, tsv]
        description: File type for the templates
    responses:
      200:
        description: A ZIP file containing all the templates
        content:
          application/zip:
            schema:
              type: string
              format: binary
      400:
        $ref: '#/components/responses/BadRequest'
      404:
        $ref: '#/components/responses/NotFound'
      500:
        $ref: '#/components/responses/ServerError'
